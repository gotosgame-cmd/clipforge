name: Build ClipForge APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Instalar sistema
        run: |
          sudo apt update
          sudo apt install -y python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config libncurses5-dev libffi-dev libssl-dev cmake

      - name: Instalar Python
        run: pip3 install buildozer cython kivy==2.3.0 kivymd==1.2.0 pillow plyer

      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Primera pasada (descarga SDK)
        run: buildozer android debug 2>&1 || true

      - name: Aceptar licencias Android
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          if [ -d "$SDK/cmdline-tools/latest/bin" ]; then
            yes | $SDK/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          fi

      - name: Compilar APK (pasada final)
        run: buildozer android debug 2>&1

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipForge-APK
          path: bin/*.apk
