name: Build ClipForge APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Compilar APK con Docker buildozer
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: ClipForge-APK
          path: bin/*.apk
          retention-days: 7
